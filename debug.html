<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Debug Test</title>
</head>
<body>
  <h1>Debug Test</h1>
  <button id="test-btn">Test Right Click</button>
  <div id="log"></div>

  <script>
    const logDiv = document.getElementById('log');
    const testBtn = document.getElementById('test-btn');

    function log(message) {
      logDiv.innerHTML += '<div>' + message + '</div>';
      console.log(message);
    }

    testBtn.addEventListener('contextmenu', (event) => {
      event.preventDefault();
      log('Right click detected on test button');
    });

    log('Page loaded');
  </script>
</body>
</html>
