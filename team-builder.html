<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TFT Team Builder</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="team-builder bg-zinc-950 text-zinc-100 min-h-screen">
 <header class="bg-black border-b border-yellow-500 py-4">
    <div class="max-w-6xl mx-auto px-6 flex justify-between items-center">
      <h1 class="text-3xl font-bold text-yellow-400 cursor-pointer" onclick="window.location.href='index.html'">TFTier</h1>
      <nav class="flex space-x-6">
        <a href="index.html" class="text-zinc-400 hover:text-zinc-300">👑Tier</a>
        <a href="builder.html" class="text-zinc-400 hover:text-zinc-300">📘Guide</a>
        <a href="team-builder.html" class="text-zinc-400 hover:text-zinc-300">🧩Builder</a>
        <a href="info.html" class="text-yellow-400 hover:text-yellow-300">📝Info</a>
        <a href="links.html" class="text-zinc-400 hover:text-zinc-300">🔗Link</a>
      </nav>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-6 py-8">
    <div class="flex flex-row">
      <!-- タブメニュー -->
      <div class="bg-zinc-900 border border-zinc-700 rounded-3xl p-4 mr-6" style="height: 100%;">
        <div class="flex flex-col gap-2 mb-4">
          <button class="tab-btn active" id="tab-board" onclick="switchTab('board')">BOARD</button>
          <button class="tab-btn" id="tab-champ" onclick="switchTab('champ')">CHAMP</button>
          <button class="tab-btn" id="tab-item" onclick="switchTab('item')">ITEM</button>
          <button class="tab-btn" id="tab-aug" onclick="switchTab('aug')">AUG</button>
          <button class="tab-btn" id="tab-god" onclick="switchTab('god')">GOD</button>
        </div>

        <!-- コントロールパネル -->
        <div class="flex flex-col gap-4">
          <div class="flex gap-2">
            <button onclick="setDifficulty(1)" class="difficulty-btn" style="background:green;">1</button>
            <button onclick="setDifficulty(2)" class="difficulty-btn" style="background:yellow;">2</button>
            <button onclick="setDifficulty(3)" class="difficulty-btn" style="background:red;">3</button>
          </div>
          <div class="flex flex-col gap-1">
            <button onclick="setStars(0)" class="star-btn">★0</button>
            <button onclick="setStars(1)" class="star-btn">★1</button>
            <button onclick="setStars(2)" class="star-btn">★2</button>
            <button onclick="setStars(3)" class="star-btn">★3</button>
            <button onclick="setStars(4)" class="star-btn">★4</button>
          </div>
        </div>

        <div class="flex flex-col gap-2 mt-4">
          <button class="symbol-btn" onclick="insertSymbol('→')">→</button>
          <button class="symbol-btn" onclick="insertSymbol('↔')">↔</button>
          <button class="symbol-btn" onclick="insertSymbol('/')">/</button>
          <button class="symbol-btn" onclick="insertSymbol('>')">></button>
          <button class="symbol-btn" onclick="insertSymbol('<')}"><</button>
        </div>

        <div class="text-center text-xs text-zinc-400 mt-4">選択中のスロットに記号を挿入します</div>

        <div class="flex flex-col gap-2 mt-4">
          <button class="btn-main" onclick="copyBuilderLink()">リンクをコピー</button>
          <button class="btn-main" onclick="copyBoardImage()">盤面画像コピー</button>
        </div>
      </div>

      <!-- コンテンツエリア -->
      <div class="flex-1">
        <!-- 盤面 -->
        <div id="content-board" class="content-panel">
          <div class="flex flex-col gap-4">
            <div id="selected-info" class="rounded-2xl border border-zinc-800 bg-zinc-900 px-4 py-3 text-sm text-zinc-300">
              <div id="selected-slot-label">スロットが選択されていません。</div>
              <div id="selected-champion-info" class="mt-1">チャンピオンを選択してください。</div>
            </div>
            <div id="board-container" class="bg-zinc-950 border border-zinc-800 rounded-3xl p-4">
              <div id="board-grid" class="hex-board"></div>
            </div>
          </div>
        </div>

        <!-- チャンピオン/アイテムパレット -->
        <div id="content-palette" class="content-panel hidden">
          <div class="bg-zinc-900 border border-zinc-700 rounded-3xl p-5">
            <div class="flex justify-center gap-4 mb-4">
              <button onclick="changeSelectedSlotSize('L')" class="size-btn">L</button>
              <button onclick="changeSelectedSlotSize('M')" class="size-btn">M</button>
              <button onclick="changeSelectedSlotSize('S')" class="size-btn">S</button>
            </div>

            <div class="flex justify-center gap-4 mb-4">
              <button onclick="document.getElementById('asset-up').click()" class="btn-main">+ 画像読込</button>
              <label class="flex items-center gap-2 text-sm text-zinc-400">
                <input type="checkbox" id="show-hidden-toggle" onchange="renderPalette()">
                非表示を表示
              </label>
            </div>

            <input type="file" id="asset-up" multiple style="display:none" onchange="handleAssetUpload(event)">
            <div id="palette-container" class="overflow-y-auto bg-zinc-950 border border-zinc-800 rounded-2xl p-4" style="max-height: 600px;">
              <div id="palette-grid"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- URLツール -->
    <div class="bg-zinc-900 border border-zinc-700 rounded-3xl p-4 mt-6">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="url-tool-row">
          <label class="text-xs text-zinc-400 mb-2 block">TT Link (Main):</label>
          <div class="url-input-group">
            <input type="text" id="tt-url" class="flex-1 bg-zinc-950 border border-zinc-700 px-3 py-2 text-sm text-zinc-200 rounded" oninput="markChanged()" placeholder="https://...">
            <button class="url-btn" onclick="pasteFromClipboard('tt-url')" title="クリップボードのリンクを貼り付け">📋</button>
            <button class="url-btn" onclick="insertBuilderLink('tt-url')" title="ビルダーリンクを挿入">↪</button>
            <button class="url-btn" onclick="document.getElementById('tt-url').value=''; markChanged();">×</button>
            <button class="url-btn" onclick="openLink('tt-url')">🌐</button>
          </div>
        </div>
        <div class="url-tool-row">
          <label class="text-xs text-zinc-400 mb-2 block">Progression Link:</label>
          <div class="url-input-group">
            <input type="text" id="tt-url-prog" class="flex-1 bg-zinc-950 border border-zinc-700 px-3 py-2 text-sm text-zinc-200 rounded" oninput="markChanged()" placeholder="進行リンク">
            <button class="url-btn" onclick="pasteFromClipboard('tt-url-prog')">📋</button>
            <button class="url-btn" onclick="document.getElementById('tt-url-prog').value=''; markChanged();">×</button>
            <button class="url-btn" onclick="openLink('tt-url-prog')">🌐</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
  <script src="team-builder.js"></script>
</body>
</html>
