<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TFT Team Builder</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="team-builder bg-zinc-950 text-zinc-100 min-h-screen">
  <header class="bg-black border-b border-yellow-500 py-4">
    <div class="max-w-6xl mx-auto px-6 flex justify-between items-center">
      <h1 class="text-3xl font-bold text-yellow-400 cursor-pointer" onclick="window.location.href='index.html'">TFTier</h1>
      <nav class="flex space-x-6">
        <a href="index.html" class="text-zinc-400 hover:text-zinc-300">👑Tier</a>
        <a href="team-builder.html" class="text-yellow-400 hover:text-yellow-300">🧩Builder</a>
        <a href="info.html" class="text-zinc-400 hover:text-zinc-300">📝Info</a>
        <a href="links.html" class="text-zinc-400 hover:text-zinc-300">🔗Link</a>
      </nav>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-6 py-8">
    <div class="flex flex-col md:flex-row gap-6">
      <section class="flex-1 bg-zinc-900 border border-zinc-700 rounded-3xl p-5">
        <div class="flex flex-col gap-4 mb-4 sm:flex-row sm:items-center sm:justify-between">
          <h1 class="text-3xl font-bold text-yellow-400">Team Builder</h1>
          <div class="flex flex-wrap gap-2">
            <button class="btn-main" type="button" onclick="copyBuilderLink()">リンクをコピー</button>
            <button class="btn-main" type="button" onclick="copyBoardImage()">盤面画像コピー</button>
          </div>
        </div>
        <div class="flex flex-col gap-3 mb-4">
          <input id="builder-link" readonly class="w-full rounded-2xl border border-zinc-700 bg-zinc-950 px-4 py-2 text-sm text-zinc-200" placeholder="ここにビルダーリンクが生成されます">
          <div id="builder-copy-status" class="text-xs text-emerald-400"></div>
        </div>
        <div id="board-container" class="bg-zinc-950 border border-zinc-800 rounded-3xl p-4">
          <div id="board-grid" class="hex-board"></div>
        </div>
      </section>

      <aside class="w-full md:w-96 flex flex-col gap-4">
        <div class="bg-zinc-900 border border-zinc-700 rounded-3xl p-5">
          <div class="flex items-center justify-between gap-3 mb-4">
            <div>
              <h2 class="text-xl font-bold text-yellow-400">選択中スロット</h2>
              <p id="selected-slot-label" class="text-zinc-400 text-sm mt-1">チャンピオンを置くスロットを選択してください。</p>
            </div>
            <button class="px-3 py-2 rounded-xl bg-yellow-500 text-zinc-950 font-semibold hover:bg-yellow-400" onclick="clearSelectedSlot()">解除</button>
          </div>
          <div class="grid grid-cols-4 gap-2 mb-4">
            <button class="star-btn" onclick="setStars(1)">★1</button>
            <button class="star-btn" onclick="setStars(2)">★2</button>
            <button class="star-btn" onclick="setStars(3)">★3</button>
            <button class="star-btn" onclick="setStars(4)">★4</button>
          </div>
          <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-4 text-zinc-300">
            <p class="text-sm">選択中のチャンピオン:</p>
            <div id="selected-champion-info" class="mt-3 text-sm text-zinc-200">なし</div>
          </div>
        </div>

        <div class="bg-zinc-900 border border-zinc-700 rounded-3xl p-5">
          <h2 class="text-xl font-bold text-yellow-400 mb-3">チャンピオン選択</h2>
          <div id="champion-palette" class="grid grid-cols-4 gap-3 max-h-96 overflow-y-auto"></div>
        </div>

        <div class="bg-zinc-900 border border-zinc-700 rounded-3xl p-5">
          <h2 class="text-xl font-bold text-yellow-400 mb-3">アイテム（最大3つ）</h2>
          <div id="item-palette" class="grid grid-cols-4 gap-3 max-h-96 overflow-y-auto"></div>
        </div>
      </aside>
    </div>
  </main>

  <script src="script.js"></script>
  <script src="team-builder.js"></script>
</body>
</html>
