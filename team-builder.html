<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TFT Team Builder</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="team-builder bg-zinc-950 text-zinc-100 min-h-screen flex">
  <div id="nav-sidebar">
    <h1 class="nav-title" onclick="window.location.href='index.html'">TFTier</h1>
    <nav class="nav-menu">
      <a href="index.html" class="nav-link">👑Tier</a>
      <a href="builder.html" class="nav-link">📘Guide</a>
      <a href="team-builder.html" class="nav-link active">🧩Builder</a>
      <a href="info.html" class="nav-link">📝Info</a>
      <a href="links.html" class="nav-link">🔗Link</a>
    </nav>
  </div>

  <main class="flex-1 px-6 py-8 overflow-y-auto">
    <div class="flex flex-col gap-6">
      <section class="bg-zinc-900 border border-zinc-700 rounded-3xl p-5">
        <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
          <div>
            <h1 class="text-3xl font-bold text-yellow-400">TFT Team Builder</h1>
            <p class="text-zinc-400 mt-2">四行×七列の六角形ボードと、右側パレットでチャンピオンを配置します。</p>
          </div>
          <div class="flex flex-wrap gap-2">
            <button class="btn-main" type="button" onclick="copyBuilderLink()">リンクをコピー</button>
            <button class="btn-main" type="button" onclick="copyBoardImage()">盤面画像コピー</button>
          </div>
        </div>

        <div class="mt-5 rounded-2xl border border-zinc-800 bg-zinc-950 p-4">
          <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
            <div>
              <div id="selected-slot-label" class="text-sm text-zinc-300">スロットが選択されていません。</div>
              <div id="selected-champion-info" class="mt-1 text-xs text-zinc-400">チャンピオンを選択してください。</div>
            </div>
            <input id="builder-link" readonly class="w-full sm:w-80 rounded-2xl border border-zinc-700 bg-zinc-950 px-4 py-2 text-sm text-zinc-200" placeholder="ここにビルダーリンクが生成されます">
          </div>
          <div id="builder-copy-status" class="mt-2 text-xs text-emerald-400"></div>
        </div>

<div id="board-container" class="bg-zinc-950 border border-zinc-800 rounded-3xl p-6 mt-6">
  <div class="flex gap-8">
    <!-- 左: チャンピオン一覧 -->
    <div class="w-28">
      <h3 class="text-yellow-400 text-sm mb-3">CHAMPIONS</h3>
      <div id="bench" class="flex flex-col gap-3"></div>
    </div>

    <!-- 中央: Hexボード -->
    <div>
      <h1 class="text-3xl font-bold text-yellow-400 mb-4">TFT Hex Board</h1>
      <div id="board" class="hex-board"></div>
    </div>

    <!-- 右: アイテム一覧 -->
    <div class="w-28">
      <h3 class="text-yellow-400 text-sm mb-3">ITEMS</h3>
      <div id="items-palette" class="flex flex-wrap gap-3"></div>
    </div>
  </div>
</div>
      </section>

      <section class="flex flex-col gap-6 lg:flex-row">
        <aside id="right-sidebar" class="w-full lg:w-96 flex flex-col gap-4">
          <div class="bg-zinc-900 border border-zinc-700 rounded-3xl p-4">
            <div class="flex flex-col gap-4">
              <div class="flex justify-center gap-3">
                <button onclick="setDifficulty(1)" class="symbol-btn" style="background:green; width:36px; height:36px;">1</button>
                <button onclick="setDifficulty(2)" class="symbol-btn" style="background:yellow; width:36px; height:36px;">2</button>
                <button onclick="setDifficulty(3)" class="symbol-btn" style="background:red; width:36px; height:36px;">3</button>
              </div>
              <div class="flex justify-center gap-2 flex-wrap">
                <button onclick="setStars(0)" class="star-btn">★0</button>
                <button onclick="setStars(1)" class="star-btn">★1</button>
                <button onclick="setStars(2)" class="star-btn">★2</button>
                <button onclick="setStars(3)" class="star-btn">★3</button>
                <button onclick="setStars(4)" class="star-btn">★4</button>
              </div>
              <div class="symbol-row justify-center">
                <button class="symbol-btn" onclick="insertSymbol('→')">→</button>
                <button class="symbol-btn" onclick="insertSymbol('↔')">↔</button>
                <button class="symbol-btn" onclick="insertSymbol('/')">/</button>
                <button class="symbol-btn" onclick="insertSymbol('>')">&gt;</button>
                <button class="symbol-btn" onclick="insertSymbol('<')">&lt;</button>
              </div>
              <div class="text-center text-xs text-zinc-400">選択中のスロットに記号を挿入します</div>
            </div>
          </div>

          <div class="bg-zinc-900 border border-zinc-700 rounded-3xl p-4">
            <div class="flex gap-1 bg-black rounded-2xl overflow-hidden">
              <button class="p-tab active" id="tab-c" onclick="setPalette('c')">CHAMP</button>
              <button class="p-tab" id="tab-i" onclick="setPalette('i')">ITEM</button>
              <button class="p-tab" id="tab-a" onclick="setPalette('a')">AUG</button>
              <button class="p-tab" id="tab-g" onclick="setPalette('g')">GOD</button>
            </div>
            <div class="unified-size-ctrl mt-4">
              <button onclick="changeSelectedSlotSize('L')">L</button>
              <button onclick="changeSelectedSlotSize('M')">M</button>
              <button onclick="changeSelectedSlotSize('S')">S</button>
            </div>
            <div class="mt-4 flex items-center gap-2">
              <button onclick="document.getElementById('asset-up').click()" class="btn-main" style="flex:1;">+ 画像読込</button>
              <label class="text-xs text-zinc-400"><input type="checkbox" id="show-hidden-toggle" onchange="renderPalette()"> 非表示を表示</label>
            </div>
            <input type="file" id="asset-up" multiple style="display:none" onchange="handleAssetUpload(event)">
            <div id="palette-container" class="mt-4 bg-black border border-zinc-800 rounded-2xl p-3" style="min-height: 280px;">
              <div id="palette-grid"></div>
            </div>
          </div>

          <div class="bg-zinc-900 border border-zinc-700 rounded-3xl p-4">
            <div class="url-tool-row">
              <label class="text-xs text-zinc-400 mb-2 block">TT Link (Main):</label>
              <div class="url-input-group">
                <input type="text" id="tt-url" class="flex-1 rounded-2xl border border-zinc-700 bg-zinc-950 px-3 py-2 text-sm text-zinc-200" oninput="markChanged()" placeholder="https://...">
                <button class="url-btn" onclick="pasteFromClipboard('tt-url')">📋</button>
                <button class="url-btn" onclick="insertBuilderLink('tt-url')">↪</button>
                <button class="url-btn" onclick="document.getElementById('tt-url').value=''; markChanged();">×</button>
                <button class="url-btn" onclick="openLink('tt-url')">🌐</button>
              </div>
            </div>
            <div class="url-tool-row mt-4">
              <label class="text-xs text-zinc-400 mb-2 block">Progression Link:</label>
              <div class="url-input-group">
                <input type="text" id="tt-url-prog" class="flex-1 rounded-2xl border border-zinc-700 bg-zinc-950 px-3 py-2 text-sm text-zinc-200" oninput="markChanged()" placeholder="進行リンク">
                <button class="url-btn" onclick="pasteFromClipboard('tt-url-prog')">📋</button>
                <button class="url-btn" onclick="document.getElementById('tt-url-prog').value=''; markChanged();">×</button>
                <button class="url-btn" onclick="openLink('tt-url-prog')">🌐</button>
              </div>
            </div>
          </div>
        </aside>
      </section>
    </div>
  </main>

  <script src="script.js"></script>
  <script src="team-builder.js"></script>
</body>
</html>
