<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>TFT Team Builder - 修正版</title>
  <style>
    body {
      font-family: sans-serif;
      background: #111;
      color: #ddd;
      margin: 0;
      padding: 20px;
      display: flex;
      gap: 25px;
      flex-wrap: wrap;
    }

    .sidebar { display: flex; flex-direction: column; gap: 25px; }

    #bench, #items {
      background: #1f1f2e;
      padding: 15px;
      border-radius: 12px;
      border: 2px solid #444;
    }

    .piece, .item {
      width: 72px;
      height: 72px;
      background: #222;
      border: 3px solid #666;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      cursor: grab;
    }
    .item { font-size: 34px; width: 62px; height: 62px; }

    #board {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 10px 5px;
      padding: 25px;
      background: #1a1a2e;
      border: 4px solid #444;
      border-radius: 15px;
    }

    .hex {
      width: 88px;
      height: 108px;
      background: #334;
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 12px;
      position: relative;
      box-shadow: 0 4px 8px rgba(0,0,0,0.5);
    }
    .hex:nth-child(7n+1) { margin-top: 54px; }

    .hex .champ {
      width: 68px;
      height: 68px;
      background: #222;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      margin-bottom: 6px;
      position: relative;
    }

    .star {
      position: absolute;
      top: -6px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 18px;
      color: gold;
      cursor: pointer;
    }

    .items {
      display: flex;
      gap: 5px;
    }
    .item-slot {
      width: 24px;
      height: 24px;
      background: #222;
      border: 2px solid #888;
      border-radius: 6px;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hex.dragover { background: #0a5 !important; }
  </style>
</head>
<body>

  <div class="sidebar">
    <div>
      <h2>📦 チャンピオン</h2>
      <div id="bench"></div>
    </div>

    <div>
      <h2>⚔️ アイテム</h2>
      <div id="items"></div>
    </div>
  </div>

  <div>
    <h1>🛡️ TFT Hex ボード</h1>
    <div id="board"></div>
  </div>

<script>
  const itemList = ['⚔️','🛡️','🏹','🔥','❄️','🌩️','💎','🧪','👑'];

  function createBoard() {
    const board = document.getElementById('board');
    board.innerHTML = '';
    for (let i = 0; i < 28; i++) {  // 4行×7列
      const hex = document.createElement('div');
      hex.classList.add('hex');
      hex.addEventListener('dragover', e => { e.preventDefault(); hex.classList.add('dragover'); });
      hex.addEventListener('dragleave', () => hex.classList.remove('dragover'));
      hex.addEventListener('drop', e => handleDrop(e, hex));
      board.appendChild(hex);
    }
  }

  function createChampion(icon = '🐻') {
    const champ = document.createElement('div');
    champ.className = 'champ';
    champ.draggable = true;
    champ.dataset.stars = 1;
    champ.innerHTML = `
      <div class="star">★</div>
      <div>${icon}</div>
    `;

    // 星クリック
    champ.querySelector('.star').addEventListener('click', (e) => {
      e.stopPropagation();
      let s = parseInt(champ.dataset.stars);
      s = s >= 4 ? 1 : s + 1;
      champ.dataset.stars = s;
      champ.querySelector('.star').textContent = '★'.repeat(s);
    });

    addDragToChampion(champ);
    return champ;
  }

  function addDragToChampion(champ) {
    champ.addEventListener('dragstart', e => {
      const hex = champ.parentElement;
      const data = {
        type: 'champ',
        icon: champ.querySelector('div:last-child').innerHTML,
        stars: champ.dataset.stars,
        items: Array.from(hex.querySelectorAll('.item-slot')).map(s => s.innerHTML)
      };
      e.dataTransfer.setData('application/json', JSON.stringify(data));

      setTimeout(() => { hex.innerHTML = ''; }, 10);
    });
  }

  function handleDrop(e, hex) {
    e.preventDefault();
    hex.classList.remove('dragover');

    try {
      const data = JSON.parse(e.dataTransfer.getData('application/json'));

      if (data.type === 'champ') {
        hex.innerHTML = '';
        const newChamp = createChampion(data.icon);
        newChamp.dataset.stars = data.stars;
        newChamp.querySelector('.star').textContent = '★'.repeat(data.stars);

        // アイテム復元
        const itemsDiv = document.createElement('div');
        itemsDiv.className = 'items';
        data.items.forEach(icon => addItemSlot(itemsDiv, icon));
        hex.appendChild(newChamp);
        hex.appendChild(itemsDiv);

      } else if (data.type === 'item') {
        // アイテムを付ける
        const existingChamp = hex.querySelector('.champ');
        if (existingChamp) {
          let itemsDiv = hex.querySelector('.items');
          if (!itemsDiv) {
            itemsDiv = document.createElement('div');
            itemsDiv.className = 'items';
            hex.appendChild(itemsDiv);
          }
          if (itemsDiv.children.length < 3) {
            addItemSlot(itemsDiv, data.icon);
          } else {
            alert("アイテムは3つまでです！");
          }
        }
      }
    } catch {
      // 新規チャンピオン配置
      const icon = e.dataTransfer.getData('text/plain') || '🐻';
      hex.innerHTML = '';
      const champ = createChampion(icon);
      const itemsDiv = document.createElement('div');
      itemsDiv.className = 'items';
      hex.appendChild(champ);
      hex.appendChild(itemsDiv);
    }
  }

  function addItemSlot(container, icon) {
    const slot = document.createElement('div');
    slot.className = 'item-slot';
    slot.textContent = icon;
    container.appendChild(slot);
  }

  // 初期化
  function init() {
    createBoard();

    // チャンピオン
    const bench = document.getElementById('bench');
    ['🐻','🐺','🐉','🦅','🐍','🦁'].forEach(icon => {
      const p = document.createElement('div');
      p.className = 'piece';
      p.draggable = true;
      p.textContent = icon;
      p.addEventListener('dragstart', e => e.dataTransfer.setData('text/plain', icon));
      bench.appendChild(p);
    });

    // アイテム
    const itemsArea = document.getElementById('items');
    itemList.forEach(icon => {
      const item = document.createElement('div');
      item.className = 'item';
      item.textContent = icon;
      item.draggable = true;
      item.addEventListener('dragstart', e => {
        e.dataTransfer.setData('application/json', JSON.stringify({type:'item', icon:icon}));
      });
      itemsArea.appendChild(item);
    });
  }

  init();
</script>
</body>
</html>
