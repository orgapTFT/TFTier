<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TFT Guide Builder</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body onpaste="handlePaste(event)">
<div style="background:#000; border-bottom:1px solid #f59e0b; padding:16px 0;">
  <div style="max-width:1080px; margin:0 auto; padding:0 60px; display:flex; justify-content:space-between; align-items:center;">
    <h1 style="font-size:24px; font-weight:bold; color:#f59e0b; cursor:pointer;" onclick="window.location.href='index.html'">TFTier</h1>
    <nav style="display:flex; gap:24px;">
      <a href="index.html" style="color:#f59e0b; text-decoration:none;">👑Tier</a>
      <a href="builder.html" style="color:#f59e0b; text-decoration:none;">📘Guide</a>
      <a href="team-builder.html" style="color:#64748b; text-decoration:none;">🧩Builder</a>
      <a href="info.html" style="color:#64748b; text-decoration:none;">📝Info</a>
      <a href="links.html" style="color:#64748b; text-decoration:none;">🔗Link</a>
    </nav>
  </div>
</div>

<div id="left-sidebar">
    <div style="display:flex; gap:5px; margin-bottom:10px;">
        <button class="btn-main" style="flex:1; margin:0;" onclick="undo()">↩ 戻す</button>
        <button class="btn-main" style="flex:1; margin:0;" onclick="redo()">↪ 進む</button>
    </div>
    <button class="btn-main" onclick="savePNG()">PNG保存</button>
    <button class="btn-main" style="background:#22c55e;" onclick="addNewGuide()">+ ガイド追加</button>
    <div id="guide-list" style="flex:1; overflow-y:auto;"></div>
    <div style="padding-top:10px; border-top:1px solid #333;">
        <div id="save-timer-display">保存まで: 60s</div>
        <div id="autosave-status">● 自動保存完了</div>
        <button class="btn-main" style="background:#334155;" onclick="exportProject()">プロジェクト保存</button>
        <button class="btn-main" style="background:#334155;" onclick="document.getElementById('import-input').click()">読込</button>
        <input type="file" id="import-input" style="display:none" onchange="importProject(event)">
    </div>
</div>

<div id="main-editor">
    <div id="canvas">
        <div id="header">
            <div id="header-left">
                <div id="header-icons">
                    <div class="slot size-L header-slot" onclick="sel(this)"></div>
                    <div class="slot size-L header-slot" onclick="sel(this)"></div>
                    <div class="slot size-L header-slot" onclick="sel(this)"></div>
                </div>
                <div id="difficulty-box"></div>
            </div>
            <div id="title-container"><div id="in-title" contenteditable="true" data-placeholder="TITLE" oninput="markChanged()"></div></div>
        </div>

        <div id="board-area">
            <img id="board-img" crossOrigin="anonymous" style="display:none">
            <p id="board-msg" style="color:#222; font-size:24px;">Ctrl+V で画像を貼り付け</p>
        </div>

        <div class="black-section"><div class="slot-group" id="row-alt" style="justify-content:center; gap: 8px;"></div></div>
        <div class="row-wrap"><div class="slot-group" id="row-prog"></div></div>
        <div id="equip-area"></div>
        <div style="padding: 0 60px; margin-top: 28px; display: flex; justify-content: space-between; align-items: flex-start; width: 100%; box-sizing: border-box;">
            <div class="slot-group" id="row-aug"></div>
            <div class="slot-group" id="row-god"></div>
        </div>
        <div id="footer">
            <div id="f-bold" contenteditable="true" data-placeholder="強調メッセージ" oninput="markChanged()"></div>
            <div id="f-desc" contenteditable="true" data-placeholder="詳細な解説文を入力..." oninput="markChanged()"></div>
        </div>
    </div>
</div>

<div id="right-sidebar">
    <div style="background:#000; padding:12px; border-radius:4px; margin-bottom:12px; flex-shrink: 0;">
        <div style="display:flex; gap:10px; justify-content:center; margin-bottom:15px;">
            <button onclick="setDifficulty(1)" style="background:green; width:35px; height:35px; border:none; cursor:pointer; border-radius:3px;"></button>
            <button onclick="setDifficulty(2)" style="background:yellow; width:35px; height:35px; border:none; cursor:pointer; border-radius:3px;"></button>
            <button onclick="setDifficulty(3)" style="background:red; width:35px; height:35px; border:none; cursor:pointer; border-radius:3px;"></button>
        </div>
        <div style="display:flex; gap:6px; justify-content:center;">
            <button onclick="setStars(0)" style="font-size:10px;">★0</button>
            <button onclick="setStars(1)">★1</button><button onclick="setStars(2)">★2</button><button onclick="setStars(3)">★3</button><button onclick="setStars(4)">★4</button>
        </div>
        <div class="symbol-row">
            <button class="symbol-btn" onclick="insertSymbol('→')">→</button>
            <button class="symbol-btn" onclick="insertSymbol('↔')">↔</button>
            <button class="symbol-btn" onclick="insertSymbol('/')">/</button>
            <button class="symbol-btn" onclick="insertSymbol('>')">&gt;</button>
            <button class="symbol-btn" onclick="insertSymbol('<')">&lt;</button>
        </div>
        <div style="font-size:11px; color:#aaa; text-align:center; margin-top:6px;">選択中のスロットに記号を挿入します</div>
    </div>
    <div style="display:flex; background:#000; flex-shrink: 0;">
        <button class="p-tab active" id="tab-c" onclick="setPalette('c')">CHAMP</button>
        <button class="p-tab" id="tab-i" onclick="setPalette('i')">ITEM</button>
        <button class="p-tab" id="tab-a" onclick="setPalette('a')">AUG</button>
        <button class="p-tab" id="tab-g" onclick="setPalette('g')">GOD</button>
    </div>

    <div class="unified-size-ctrl">
        <button onclick="changeSelectedSlotSize('L')">L</button>
        <button onclick="changeSelectedSlotSize('M')">M</button>
        <button onclick="changeSelectedSlotSize('S')">S</button>
    </div>

    <div style="display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid #222;">
        <button onclick="document.getElementById('asset-up').click()" style="flex:1; font-size:11px; padding:8px; background:#475569; border:none; color:#fff; cursor:pointer; font-weight:bold;">+ 画像読込</button>
        <label style="font-size:10px; color:#aaa;"><input type="checkbox" id="show-hidden-toggle" onchange="renderPalette()"> 非表示を表示</label>
    </div>
    <input type="file" id="asset-up" multiple style="display:none" onchange="handleAssetUpload(event)">
    <div id="palette-container" style="flex:1; overflow-y:auto; background:#000; margin:10px 0; border:1px solid #222;">
        <div id="palette-grid"></div>
    </div>
    <div style="margin-top:auto; background:#000; padding:12px; flex-shrink: 0;">
        <div class="url-tool-row">
            <label style="font-size:9px; color:#888;">TT Link (Main):</label>
            <div class="url-input-group">
                <input type="text" id="tt-url" style="flex:1; font-size:11px; background:#111; color:#fff; border:1px solid #333; padding:6px; height:28px;" oninput="markChanged()" placeholder="https://...">
                <button class="url-btn" onclick="pasteFromClipboard('tt-url')" title="クリップボードのビルダーリンクを貼り付け">📋</button>
                <button class="url-btn" onclick="insertBuilderLink('tt-url')" title="ビルダーリンクを挿入">↪</button>
                <button class="url-btn" onclick="document.getElementById('tt-url').value=''; markChanged();">×</button>
                <button class="url-btn" onclick="openLink('tt-url')">🌐</button>
            </div>
        </div>
        <div class="url-tool-row">
            <label style="font-size:9px; color:#888;">Progression Link:</label>
            <div class="url-input-group">
                <input type="text" id="tt-url-prog" style="flex:1; font-size:11px; background:#111; color:#fff; border:1px solid #333; padding:6px; height:28px;" oninput="markChanged()" placeholder="進行リンク">
                <button class="url-btn" onclick="pasteFromClipboard('tt-url-prog')">📋</button>
                <button class="url-btn" onclick="document.getElementById('tt-url-prog').value=''; markChanged();">×</button>
                <button class="url-btn" onclick="openLink('tt-url-prog')">🌐</button>
            </div>
        </div>
    </div>
</div>
<div id="board-context-menu" class="board-context-menu"></div>

<script src="script.js"></script>
</body>
</html>
