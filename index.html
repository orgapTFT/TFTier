<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TFT Set 17 シンプルテスト</title>
  <style>
    body { 
      font-family: Arial, sans-serif; 
      background: #0a0a14; 
      color: #eee; 
      padding: 40px; 
      text-align: center;
    }
    h1 { color: #ffd700; }
    .units { 
      display: flex; 
      flex-wrap: wrap; 
      gap: 20px; 
      justify-content: center; 
      margin-top: 30px;
    }
    .unit {
      width: 120px;
      position: relative;
    }
    .unit img {
      width: 100%;
      border: 3px solid #666;
      border-radius: 12px;
    }
    .unit:hover img {
      border-color: #ffd700;
      transform: scale(1.1);
    }
    .name { margin-top: 8px; font-weight: bold; }
  </style>
</head>
<body>
  <h1>TFT Set 17 シンプルテスト（画像だけ）</h1>
  <div class="units" id="units"></div>

  <script>
    const champs = [
      {id: "TFT17_Mordekaiser", name: "Mordekaiser"},
      {id: "TFT17_Blitzcrank", name: "Blitzcrank"},
      {id: "TFT17_Shen", name: "Shen"},
      {id: "TFT17_Illaoi", name: "Illaoi"},
      {id: "TFT17_Jinx", name: "Jinx"},
      {id: "TFT17_Aurora", name: "Aurora"},
      {id: "TFT17_Nunu", name: "Nunu"},
      {id: "TFT17_Xayah", name: "Xayah"},
      {id: "TFT17_Leona", name: "Leona"},
      {id: "TFT17_Aatrox", name: "Aatrox"}
    ];

    const container = document.getElementById('units');
    
    // バージョンは手動で最新っぽいものを試す（17.2対応）
    const version = "17.2.1";   // 必要に応じて変えてください

    champs.forEach(champ => {
      const imgUrl = `https://ddragon.leagueoflegends.com/cdn/${version}/img/tft-champion/${champ.id}.png`;
      
      const div = document.createElement('div');
      div.className = 'unit';
      div.innerHTML = `
        <img src="${imgUrl}" alt="${champ.name}" onerror="this.src='https://via.placeholder.com/120?text=${champ.name}'">
        <div class="name">${champ.name}</div>
      `;
      container.appendChild(div);
    });
  </script>
</body>
</html>
