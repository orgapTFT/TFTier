<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TFT Set 17 主要ユニット一覧</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0a0a14;
      color: #eee;
      margin: 0;
      padding: 40px 20px;
    }
    h1 {
      text-align: center;
      color: #ffd700;
      margin-bottom: 40px;
    }
    .units-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 28px;
      max-width: 1600px;
      margin: 0 auto;
    }
    .unit {
      position: relative;
      text-align: center;
      cursor: pointer;
    }
    .unit img {
      width: 100%;
      max-width: 150px;
      border: 3px solid #555;
      border-radius: 14px;
      transition: all 0.3s;
    }
    .unit:hover img {
      border-color: #ffd700;
      transform: scale(1.08);
      box-shadow: 0 0 25px rgba(255, 215, 0, 0.6);
    }
    .unit-name {
      margin-top: 12px;
      font-weight: bold;
      font-size: 16px;
    }

    .tooltip {
      visibility: hidden;
      position: absolute;
      bottom: 115%;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(18, 18, 42, 0.98);
      border: 2px solid #ffd700;
      border-radius: 12px;
      padding: 18px;
      width: 320px;
      z-index: 100;
      box-shadow: 0 15px 40px rgba(0,0,0,0.85);
      text-align: left;
      font-size: 14.5px;
    }
    .unit:hover .tooltip {
      visibility: visible;
    }
    .tooltip strong { color: #ffd700; font-size: 18px; display: block; margin-bottom: 10px; }
    .trait { color: #99ff99; }
  </style>
</head>
<body>
  <h1>TFT Set 17 主要ユニット一覧</h1>
  <div class="units-container" id="units"></div>

  <script>
    async function loadChampions() {
      try {
        const response = await fetch('tft17-champions.json');
        const tftData = await response.json();

        const container = document.getElementById('units');
        container.innerHTML = '';

        tftData.champions.forEach(champ => {
          const div = document.createElement('div');
          div.className = 'unit';

          // あなたのフォルダ構造に合わせたパス（小文字）
          const champLower = champ.name.toLowerCase().replace(/[^a-z]/g, '');

          div.innerHTML = `
            <picture>
              <!-- 1. AVIF優先 -->
              <source srcset="img/champ/17/${champLower}.avif" type="image/avif">
              
              <!-- 2. WebPフォールバック（まだ無い場合はスキップ） -->
              <source srcset="img/champ/17/${champLower}.webp" type="image/webp">
              
              <!-- 3. 最終フォールバック -->
              <img src="img/champ/17/${champLower}.avif" 
                   alt="${champ.name}"
                   width="320" 
                   height="320"
                   loading="lazy"
                   onerror="this.src='https://via.placeholder.com/150?text=${champ.name}'">
            </picture>
            
            <div class="unit-name">${champ.name} <span style="color:#aaa">(${champ.tier}コス)</span></div>
            
            <div class="tooltip">
              <strong>${champ.name}</strong><br>
              コスト: ${champ.tier}<br>
              トレイト: <span class="trait">${champ.traits ? champ.traits.join(' / ') : 'なし'}</span><br><br>
              <strong>スキル:</strong><br>
              ${champ.skillDesc || 'スキル説明未登録'}<br><br>
              <strong>メモ:</strong><br>
              ${champ.notes || 'メモ未登録'}
            </div>
          `;
          container.appendChild(div);
        });

      } catch (error) {
        console.error('JSON読み込みエラー:', error);
        document.getElementById('units').innerHTML = `
          <p style="color:red; text-align:center; grid-column: 1 / -1;">
            tft17-champions.json の読み込みに失敗しました。
          </p>`;
      }
    }

    window.onload = loadChampions;
  </script>
</body>
</html>
