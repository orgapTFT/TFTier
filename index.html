<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orgap TFTier - TFTガイド</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
  <header class="bg-black border-b border-yellow-500 py-10">
    <div class="max-w-6xl mx-auto px-6">
      <h1 class="text-5xl font-bold text-yellow-400">Orgap TFTier</h1>
      <p class="text-xl text-zinc-400 mt-3">TFT 構成ガイド & Tier List</p>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-6 py-16">
    <div class="text-center">
      <h2 class="text-4xl font-bold mb-6">現在準備中です</h2>
      <p class="text-zinc-400 text-2xl">TFTのティアリストと詳細ガイドを順次公開していきます。</p>
      
      <div class="mt-16 p-8 bg-zinc-900 rounded-2xl inline-block">
        <p class="text-yellow-400 text-lg">デプロイテスト成功！</p>
        <p class="text-zinc-500 mt-2">Cloudflare Pagesで公開されています</p>
      </div>
    </div>

<section class="mt-12">
  <h2 class="text-3xl font-bold text-yellow-400 mb-6 text-center">Set 17 ティアリスト（Patch 17.2）</h2>
  
  <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
    <!-- Sティア -->
    <div class="bg-zinc-800 p-6 rounded-xl border border-yellow-500">
      <h3 class="text-2xl font-bold text-yellow-400 mb-4">S Tier</h3>
      <ul class="space-y-2 text-zinc-100">
        <li>・Vex Fast 9</li>
        <li>・Vanguard Nunu & Willump</li>
        <li>・Mecha Brawlers</li>
      </ul>
    </div>
    
    <!-- Aティア -->
    <div class="bg-zinc-800 p-6 rounded-xl border border-green-500">
      <h3 class="text-2xl font-bold text-green-400 mb-4">A Tier</h3>
      <ul class="space-y-2 text-zinc-100">
        <li>・Space Groove Riven</li>
        <li>・Stargazer Snipers</li>
        <!-- 追加 -->
      </ul>
    </div>
    <!-- B, C も同様に -->
  </div>
</section>

  </main>
</body>
</html>
