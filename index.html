<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TFT Set 17 画像テスト</title>
  <style>
    body { 
      font-family: Arial, sans-serif; 
      background: #0a0a14; 
      color: #eee; 
      padding: 40px; 
      text-align: center;
    }
    h1 { color: #ffd700; }
    .units { 
      display: flex; 
      flex-wrap: wrap; 
      gap: 25px; 
      justify-content: center; 
      margin-top: 40px;
    }
    .unit {
      width: 130px;
      position: relative;
      text-align: center;
    }
    .unit img {
      width: 100%;
      border: 3px solid #666;
      border-radius: 12px;
      transition: 0.3s;
    }
    .unit:hover img {
      border-color: #ffd700;
      transform: scale(1.12);
    }
    .name { 
      margin-top: 10px; 
      font-weight: bold; 
      font-size: 15px;
    }
    .error { color: #ff6666; font-size: 12px; }
  </style>
</head>
<body>
  <h1>TFT Set 17 画像表示テスト</h1>
  <div class="units" id="units"></div>

  <script>
    const champs = [
      {id: "TFT17_Mordekaiser", name: "Mordekaiser"},
      {id: "TFT17_Blitzcrank", name: "Blitzcrank"},
      {id: "TFT17_Shen", name: "Shen"},
      {id: "TFT17_Illaoi", name: "Illaoi"},
      {id: "TFT17_Jinx", name: "Jinx"},
      {id: "TFT17_Aurora", name: "Aurora"},
      {id: "TFT17_Nunu", name: "Nunu"},
      {id: "TFT17_Xayah", name: "Xayah"},
      {id: "TFT17_Leona", name: "Leona"},
      {id: "TFT17_Aatrox", name: "Aatrox"}
    ];

    const container = document.getElementById('units');
    const version = "17.2.1";   // 現在の最新パッチに近いバージョン

    champs.forEach(champ => {
      // 2パターン試す（Set 17でよくある形式）
      const urls = [
        `https://ddragon.leagueoflegends.com/cdn/${version}/img/tft-champion/${champ.id}.png`,
        `https://ddragon.leagueoflegends.com/cdn/${version}/img/tft-champion/${champ.id}.TFT_Set17.png`
      ];

      const div = document.createElement('div');
      div.className = 'unit';

      // 最初のURLを試し、失敗したら2つ目に切り替え
      const img = document.createElement('img');
      img.alt = champ.name;
      img.src = urls[0];
      img.onerror = () => { img.src = urls[1]; };

      div.innerHTML = '';
      div.appendChild(img);
      div.innerHTML += `<div class="name">${champ.name}</div>`;
      
      container.appendChild(div);
    });
  </script>
</body>
</html>
