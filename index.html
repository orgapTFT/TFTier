<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TFT Set 17 画像テスト - CommunityDragon</title>
  <style>
    body { background: #0a0a14; color: #eee; padding: 40px; text-align: center; font-family: Arial, sans-serif; }
    h1 { color: #ffd700; }
    .units { display: flex; flex-wrap: wrap; gap: 25px; justify-content: center; margin-top: 40px; }
    .unit { width: 140px; }
    .unit img { width: 100%; border: 3px solid #666; border-radius: 12px; }
    .unit:hover img { border-color: #ffd700; transform: scale(1.08); }
    .name { margin-top: 10px; font-weight: bold; }
  </style>
</head>
<body>
  <h1>TFT Set 17 画像テスト（CommunityDragon）</h1>
  <div class="units" id="units"></div>

  <script>
    const champs = [
      {name: "Mordekaiser", file: "TFT17_Mordekaiser"},
      {name: "Blitzcrank", file: "TFT17_Blitzcrank"},
      {name: "Shen", file: "TFT17_Shen"},
      {name: "Illaoi", file: "TFT17_Illaoi"},
      {name: "Jinx", file: "TFT17_Jinx"},
      {name: "Aurora", file: "TFT17_Aurora"},
      {name: "Nunu", file: "TFT17_Nunu"},
      {name: "Xayah", file: "TFT17_Xayah"},
      {name: "Leona", file: "TFT17_Leona"},
      {name: "Aatrox", file: "TFT17_Aatrox"}
    ];

    const container = document.getElementById('units');

    champs.forEach(champ => {
      // CommunityDragonのスプラッシュ画像パス
      const imgUrl = `https://raw.communitydragon.org/latest/game/assets/ux/tft/championsplashes/${champ.file}.png`;

      const div = document.createElement('div');
      div.className = 'unit';
      div.innerHTML = `
        <img src="${imgUrl}" alt="${champ.name}" 
             onerror="this.src='https://via.placeholder.com/140x140/333/fff?text=${champ.name}'">
        <div class="name">${champ.name}</div>
      `;
      container.appendChild(div);
    });
  </script>
</body>
</html>
